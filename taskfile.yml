version: "3"

# canonical root taskfile for single-module Go libraries.
# delegates Go tasks to the shared partial in .toaweme/taskfile-go.yml.

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  test:
    desc: Run unit tests
    cmds:
      - task: go:test

  lint:
    desc: Run golangci-lint
    cmds:
      - task: go:lint

  fix:
    desc: gofmt + vet + tidy (run before committing)
    cmds:
      - task: go:fix

  check:
    desc: vet + lint + test (run before pushing)
    cmds:
      - task: go:check

  sec:
    desc: Run all local security audits
    cmds:
      - task: go:sec
