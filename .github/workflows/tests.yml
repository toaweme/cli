name: Tests

on:
  push:
    branches: [main]
    tags: [ "v*" ]
  workflow_dispatch:
  pull_request:

env:
  CODEVIEWER_URL: ${{ vars.CODEVIEWER_URL || 'https://code.toawe.me' }}

permissions:
  id-token: write   # mint the OIDC token; the only permission that matters here
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-quality:
    strategy:
      fail-fast: false
      matrix:
        go: [1.22, 1.23, 1.24, 1.25, 1.26]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Install mend
        run: go install github.com/toaweme/mend/cmd/mend@latest

      - name: Generate mend report
        run: mend status --json --pretty --output report.mend.json || true

      - name: Publish report
        if: matrix.go == '1.26'
        run: |
          set -euo pipefail
          [ -s report.mend.json ] || { echo "no report produced; nothing to publish"; exit 0; }
          token="$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$CODEVIEWER_URL" | jq -r .value)"
          curl -fsS -X POST "$CODEVIEWER_URL/ingest?kind=mend" \
            -H "Authorization: Bearer $token" \
            --data-binary @report.mend.json
          echo \n"published mend report to $CODEVIEWER_URL"

