version: "2"

# canonical toaweme golangci-lint config. synced via `tool sync`.
# do not edit per-repo; edit the template in toaweme/tool.

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: true

linters:
  default: none
  enable:
    # correctness / bugs
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - contextcheck
    - copyloopvar
    - durationcheck
    - errorlint
    - gocheckcompilerdirectives
    - noctx
    - predeclared
    - reassign
    - rowserrcheck
    - sqlclosecheck

    # security
    - gosec

    # style / readability
    - asasalint
    - asciicheck
    - dogsled
    - dupword
    - forbidigo
    - gocritic
    - misspell
    - nolintlint
    - revive
    - sloglint
    - unconvert
    - usestdlibvars
    - wastedassign
    - whitespace

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

    errorlint:
      errorf: true
      errorf-multi: true
      asserts: true
      comparison: true

    exhaustive:
      default-signifies-exhaustive: true

    forbidigo:
      analyze-types: true
      forbid:
        # org rule: never use em-dash or en-dash in source
        - pattern: '\x{2014}'
          msg: "em-dash is forbidden; use ASCII hyphen, comma, colon, or split the sentence"
        - pattern: '\x{2013}'
          msg: "en-dash is forbidden; use ASCII hyphen"
        - pattern: '^print$|^println$'
          msg: "use fmt or log instead of built-in print/println"

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - ifElseChain
        - hugeParam
        - rangeValCopy
        - paramTypeCombine
        - commentedOutCode
        - whyNoLint
        - unnamedResult
        - emptyStringTest
        - appendAssign
        - evalOrder
        - octalLiteral

    gosec:
      excludes:
        - G104
        - G115
        - G204
        - G306
      config:
        global:
          audit: true

    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

    misspell:
      locale: US

    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false

    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
          disabled: true
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
          disabled: true
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
          disabled: true
        - name: var-declaration
        - name: var-naming

    sloglint:
      no-mixed-args: true
      kv-only: false
      attr-only: false
      no-global: ""
      context: ""
      static-msg: false
      key-naming-case: snake
      args-on-sep-lines: false

    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1020
        - -ST1021
        - -ST1022

    unparam:
      check-exported: false

  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - dupword
          - forbidigo
          - noctx
          - unparam
      - path: examples/
        linters:
          - gosec
          - forbidigo

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/toaweme/cli

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
  sort-order:
    - file
    - linter
